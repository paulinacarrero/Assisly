<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assisly</title>
    <link rel="stylesheet" href="styles.css">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    
<div class="login-container">

    <img src="imagenes assisly/logo.png" class="logo">

    <h2>Bienvenido a Assisly</h2>
    <p>Inicia sesión para continuar</p>
    
    <form id="loginForm">
        <input type="email" name="email" placeholder="Correo electrónico" required minlength="5">

        <div class="contraseña">
            <input type="password" name="password" placeholder="Contraseña" required>
            <i class="fa-solid fa-eye-slash" style="cursor: pointer; right: 10px"></i>
        </div>

        <button type="submit" class="btn-login">
            INICIAR SESIÓN
        </button>
    </form>

    <p>¿No tienes cuenta? <a href="registro.html">Registrarse</a></p>
</div> 

<script src="login.js"></script>
</body>
</html>
